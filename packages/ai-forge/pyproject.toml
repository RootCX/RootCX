[project]
name = "ai-forge"
version = "0.1.0"
description = "AI Build Mode sidecar for RootCX Studio"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.3",
    "langgraph-checkpoint-sqlite>=2.0",
    "langchain-aws>=0.2",
    "langchain-core>=0.3",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sse-starlette>=2.0",
    "asyncpg>=0.30",
    "httpx>=0.28",
    "pydantic>=2.10",
    "tiktoken>=0.7",
]

[project.scripts]
ai-forge = "ai_forge.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_forge"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
