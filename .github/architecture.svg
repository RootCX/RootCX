  <rect x="182" y="0" width="172" height="110" rx="10" fill="#27272a"/>
  <text x="268" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">AI Agents</text>
  <text x="268" y="68" text-anchor="middle" font-size="9.5" font-weight="400" fill="#94a3b8">LLM-powered</text>

  <rect x="364" y="0" width="172" height="110" rx="10" fill="#27272a"/>
