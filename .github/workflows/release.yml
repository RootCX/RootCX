name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin, make: dist-mac-arm, name: macos-arm64, glob: "target/aarch64-apple-darwin/release/bundle/dmg/*.dmg" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, make: dist-linux, name: linux-x86_64, glob: "target/x86_64-unknown-linux-gnu/release/bundle/{appimage/*.AppImage,deb/*.deb}" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, make: dist-win, name: windows-x86_64, glob: "target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" }

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: cargo install tauri-cli --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: studio/ui/pnpm-lock.yaml

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -yq --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev

      - run: make ${{ matrix.make }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
