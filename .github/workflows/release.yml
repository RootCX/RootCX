name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin,      bundles: dmg,          name: macos-arm64 }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  bundles: "appimage,deb", name: linux-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    bundles: nsis,         name: windows-x86_64 }

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            studio/ui/pnpm-lock.yaml
            runtime/ui/pnpm-lock.yaml

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev

      - name: Build frontend
        run: |
          pnpm --dir runtime/ui install --frozen-lockfile
          pnpm --dir studio/ui install --frozen-lockfile
          pnpm --dir studio/ui build

      - name: Build Tauri app
        shell: bash
        run: |
          cargo tauri build \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundles }} \
            --config '{"build":{"beforeBuildCommand":""}}'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
