name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin,      bundles: "app,dmg",    name: macos-arm64 }
          - { os: macos-15-intel, target: x86_64-apple-darwin,       bundles: "app,dmg",    name: macos-x86_64 }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, bundles: "appimage,deb", name: linux-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   bundles: nsis,         name: windows-x86_64 }

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            studio/ui/pnpm-lock.yaml
            runtime/ui/pnpm-lock.yaml

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev

      - name: Build frontend
        run: |
          pnpm --dir runtime/ui install --frozen-lockfile
          pnpm --dir studio/ui install --frozen-lockfile
          pnpm --dir studio/ui build

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm cert.p12

      - name: Build and sign Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cargo tauri build \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundles }} \
            --config '{"build":{"beforeBuildCommand":""}}'

      - name: Tag macOS updater bundle with arch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ARCH="${{ matrix.target }}" && ARCH="${ARCH%%-*}"
          DIR="target/${{ matrix.target }}/release/bundle/macos"
          for f in "${DIR}"/*.app.tar.gz "${DIR}"/*.app.tar.gz.sig; do
            [ -f "$f" ] || continue
            base="${f%.app.tar.gz*}"
            ext="${f#"$base"}"
            mv "$f" "${base}_${ARCH}${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: Cargo.toml

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten and normalize filenames
        shell: bash
        run: |
          cd artifacts
          find . -mindepth 2 -type f -exec mv {} . \;
          find . -mindepth 1 -type d -empty -delete
          for f in *' '*; do
            [ -e "$f" ] || continue
            mv "$f" "${f// /.}"
          done

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/RootCX/RootCX/releases/download/${TAG}"

          sig() { cat "$1" 2>/dev/null || echo ""; }

          MAC_ARM="RootCX.Studio_aarch64.app.tar.gz"
          MAC_X64="RootCX.Studio_x86_64.app.tar.gz"
          LINUX="RootCX.Studio_${VERSION}_amd64.AppImage"
          WIN="RootCX.Studio_${VERSION}_x64-setup.exe"

          jq -n \
            --arg v "$VERSION" \
            --arg notes "Release ${TAG}" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_arm_sig "$(sig "artifacts/${MAC_ARM}.sig")" \
            --arg mac_arm_url "${BASE}/${MAC_ARM}" \
            --arg mac_x64_sig "$(sig "artifacts/${MAC_X64}.sig")" \
            --arg mac_x64_url "${BASE}/${MAC_X64}" \
            --arg linux_sig "$(sig "artifacts/${LINUX}.sig")" \
            --arg linux_url "${BASE}/${LINUX}" \
            --arg win_sig "$(sig "artifacts/${WIN}.sig")" \
            --arg win_url "${BASE}/${WIN}" \
            '{
              version: $v,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > latest.json

          cat latest.json

      - name: Create version-free copies for stable download URLs
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.deb' -o -name '*.AppImage' \) -print0 | while IFS= read -r -d '' f; do
            base=$(basename "$f")
            stable=$(echo "$base" | sed 's/_[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*_/_/')
            if [ "$base" != "$stable" ]; then
              cp "$f" "$(dirname "$f")/$stable"
              echo "  $base -> $stable"
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
